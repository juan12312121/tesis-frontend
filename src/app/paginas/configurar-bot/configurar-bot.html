<!-- Loading State -->
<div *ngIf="isLoading" class="flex items-center justify-center h-screen bg-gray-50">
  <div class="text-center">
    <div class="inline-block animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mb-4"></div>
    <p class="text-gray-600 font-semibold">Cargando configuración del chatbot...</p>
  </div>
</div>

<!-- Main Layout -->
<div *ngIf="!isLoading" class="flex h-screen overflow-hidden bg-gray-50">

  <!-- Sidebar Component -->
  <app-sidebar
    [sidebarOpen]="sidebarOpen"
    [empresa]="empresa"
    [usuario]="usuario"
    [currentRoute]="currentRoute"
    [unreadMessages]="0"
    (navigate)="handleNavigation($event)"
    (logout)="handleLogout()">
  </app-sidebar>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Top Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
      <div class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center space-x-4">
          <button (click)="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-gray-900">
            <i class="fas fa-bars text-xl"></i>
          </button>
          <div>
            <h2 class="text-2xl font-black text-gray-900">Configuración del Chatbot</h2>
            <p class="text-sm text-gray-500 font-medium">Gestiona horarios, mensajes y respuestas automáticas</p>
          </div>
        </div>
        <div class="flex items-center space-x-4">
          <button (click)="volver()" class="text-gray-600 hover:text-gray-900 transition flex items-center space-x-2">
            <i class="fas fa-arrow-left"></i>
            <span class="hidden sm:inline">Volver</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <main class="flex-1 overflow-y-auto bg-gray-50 p-6">

      <!-- Success/Error Messages -->
      <div *ngIf="successMessage" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg flex items-start space-x-3">
        <i class="fas fa-check-circle text-green-600 text-xl mt-0.5"></i>
        <div class="flex-1">
          <p class="text-green-800 font-semibold">{{ successMessage }}</p>
        </div>
        <button (click)="successMessage = ''" class="text-green-600 hover:text-green-800">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start space-x-3">
        <i class="fas fa-exclamation-circle text-red-600 text-xl mt-0.5"></i>
        <div class="flex-1">
          <p class="text-red-800 font-semibold">{{ errorMessage }}</p>
        </div>
        <button (click)="errorMessage = ''" class="text-red-600 hover:text-red-800">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <!-- Tabs Navigation -->
      <div class="mb-6 bg-white rounded-xl shadow-sm border border-gray-200 p-2">
        <div class="flex space-x-2">
          <button (click)="setActiveTab('horarios')"
            [ngClass]="activeTab === 'horarios' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'"
            class="flex-1 px-6 py-3 rounded-lg font-bold transition-all flex items-center justify-center space-x-2">
            <i class="fas fa-clock"></i>
            <span>Horarios y Mensajes</span>
          </button>

          <button (click)="setActiveTab('respuestas')"
            [ngClass]="activeTab === 'respuestas' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'"
            class="flex-1 px-6 py-3 rounded-lg font-bold transition-all flex items-center justify-center space-x-2">
            <i class="fas fa-comments"></i>
            <span>Respuestas Automáticas</span>
          </button>
        </div>
      </div>

      <!-- TAB: Horarios y Mensajes -->
      <div *ngIf="activeTab === 'horarios'">
        <app-horarios
          [configuracion]="configuracion"
          [hasConfiguration]="hasConfiguration"
          [diasSemana]="diasSemana"
          [isSaving]="isSaving"
          (editarConfig)="openModalHorarios()"
          (eliminarConfig)="eliminarConfiguracion()"
          (crearConfig)="openModalHorarios()">
        </app-horarios>
      </div>

      <!-- TAB: Respuestas Automáticas -->
      <div *ngIf="activeTab === 'respuestas'">
        <app-mensajes
          [respuestas]="respuestas"
          [filteredRespuestas]="filteredRespuestas"
          [loadingRespuestas]="loadingRespuestas"
          [searchTerm]="searchTerm"
          (searchTermChange)="onSearchTermChange($event)"
          (crearRespuesta)="openModalRespuesta()"
          (editarRespuesta)="openModalRespuesta($event)"
          (eliminarRespuesta)="eliminarRespuesta($event)">
        </app-mensajes>
      </div>

    </main>
  </div>
</div>

<!-- Modal: Horarios y Mensajes -->
<app-modal-horarios
  [isOpen]="showModalHorarios"
  [configuracion]="configuracion"
  [diasSemana]="diasSemana"
  [hasConfiguration]="hasConfiguration"
  [isSaving]="isSaving"
  (close)="closeModalHorarios()"
  (save)="guardarConfiguracion()"
  (diaToggled)="toggleDia($event)">
</app-modal-horarios>

<!-- Modal: Respuestas -->
<app-modal-respuesta
  [isOpen]="showModalRespuesta"
  [editingRespuesta]="editingRespuesta"
  [isSaving]="isSaving"
  (close)="closeModalRespuesta()"
  (save)="guardarRespuesta($event)">
</app-modal-respuesta>
