<aside [ngClass]="sidebarOpen ? '' : '-translate-x-full lg:translate-x-0'"
       class="w-64 bg-white dark:bg-slate-800 shadow-lg flex flex-col transition-all duration-300 fixed lg:static inset-y-0 left-0 z-50 h-screen"
       style="min-height: 100vh; max-height: 100vh;">

  <!-- Empresa Info -->
  <div class="px-4 py-3 border-b border-gray-100 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex-shrink-0">
    <div class="flex items-center space-x-3">
      <div class="w-12 h-12 bg-blue-600 dark:bg-blue-500 rounded-xl flex items-center justify-center text-white font-black text-base shadow-sm">
        {{ getEmpresaIniciales() }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-black text-gray-900 dark:text-slate-50 truncate">{{ empresa?.nombre || 'Empresa' }}</p>
        <p class="text-xs text-gray-500 dark:text-slate-400 font-medium">{{ empresa?.tipo || 'Tipo' }}</p>
      </div>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1 overflow-y-auto py-3" style="min-height: 0;">
    <div class="px-3 space-y-1">

      <!-- Dashboard -->
      <a (click)="navigateTo('dashboard')"
         [ngClass]="isActive('dashboard') ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30' : 'text-gray-700 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700'"
         class="flex items-center space-x-3 px-3 py-2.5 rounded-lg transition-all cursor-pointer group">
        <i class="fas fa-home w-5 text-center"></i>
        <span class="font-semibold text-sm">Inicio</span>
      </a>


      <!-- Catálogo (solo si está activo) -->
      <a *ngIf="empresa?.modulos?.catalogo"
         (click)="navigateTo('catalogo')"
         [ngClass]="isActive('catalogo') ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30' : 'text-gray-700 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700'"
         class="flex items-center space-x-3 px-3 py-2.5 rounded-lg transition-all cursor-pointer group">
        <i class="fas fa-box-open w-5 text-center"></i>
        <span class="font-semibold text-sm">Catálogo</span>
      </a>

      <!-- Pedidos (solo si está activo) -->
      <a *ngIf="empresa?.modulos?.pedidos"
         (click)="navigateTo('pedidos')"
         [ngClass]="isActive('pedidos') ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30' : 'text-gray-700 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700'"
         class="flex items-center space-x-3 px-3 py-2.5 rounded-lg transition-all cursor-pointer group">
        <i class="fas fa-shopping-cart w-5 text-center"></i>
        <span class="font-semibold text-sm">Pedidos</span>
      </a>

      <!-- Reservas (solo si está activo) -->
      <a *ngIf="empresa?.modulos?.reservas"
         (click)="navigateTo('reservas')"
         [ngClass]="isActive('reservas') ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30' : 'text-gray-700 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700'"
         class="flex items-center space-x-3 px-3 py-2.5 rounded-lg transition-all cursor-pointer group">
        <i class="fas fa-calendar-alt w-5 text-center"></i>
        <span class="font-semibold text-sm">Reservas</span>
      </a>

      <!-- Chatbot -->
      <a (click)="navigateTo('chatbot')"
         [ngClass]="isActive('chatbot') ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30' : 'text-gray-700 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700'"
         class="flex items-center space-x-3 px-3 py-2.5 rounded-lg transition-all cursor-pointer group">
        <i class="fas fa-robot w-5 text-center"></i>
        <span class="font-semibold text-sm">Chatbot</span>
      </a>

    </div>
  </nav>

  <!-- User Profile -->
  <div class="p-4 border-t border-gray-100 dark:border-slate-700 flex-shrink-0">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 rounded-full bg-blue-600 dark:bg-blue-500 flex items-center justify-center text-white font-bold text-sm shadow-sm">
        {{ getUserIniciales() }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-bold text-gray-900 dark:text-slate-50 truncate">{{ usuario?.nombre || 'Usuario' }}</p>
      </div>
      <button (click)="onLogout()"
              class="text-gray-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 transition"
              title="Cerrar sesión">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>

</aside>
