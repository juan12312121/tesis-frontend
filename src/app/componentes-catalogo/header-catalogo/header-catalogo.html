<!-- header-catalogo.html -->

<!-- Top Header -->
<header class="bg-white shadow-sm border-b border-gray-200">
  <div class="flex items-center justify-between px-4 sm:px-6 py-4">
    <div class="flex items-center space-x-4">
      <button (click)="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-gray-900">
        <i class="fas fa-bars text-xl"></i>
      </button>
      <h1 class="text-xl sm:text-2xl font-black text-gray-900">
        <i class="fas fa-box-open mr-2 text-blue-600"></i>
        <span class="hidden sm:inline">Catálogo</span>
      </h1>
    </div>

    <div class="flex items-center space-x-2 sm:space-x-3">

      <!-- ✅ Botón Categorías -->
      <button
        (click)="gestionarCategorias()"
        class="hidden sm:flex items-center space-x-2 px-3 sm:px-4 py-2 bg-indigo-50 text-indigo-700 font-semibold rounded-lg hover:bg-indigo-100 transition border border-indigo-200">
        <i class="fas fa-tags"></i>
        <span class="hidden md:inline">Categorías</span>
      </button>

      <!-- Botón Configuración -->
      <button
        (click)="irAConfiguracion()"
        class="hidden sm:flex items-center space-x-2 px-3 sm:px-4 py-2 bg-gray-100 text-gray-700 font-semibold rounded-lg hover:bg-gray-200 transition">
        <i class="fas fa-cog"></i>
        <span class="hidden md:inline">Configuración</span>
      </button>

      <!-- Botón Nuevo Item -->
      <button
        (click)="mostrarModalTipo()"
        class="flex items-center space-x-2 px-3 sm:px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold rounded-lg hover:shadow-lg transition">
        <i class="fas fa-plus"></i>
        <span class="hidden sm:inline">Nuevo Item</span>
      </button>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="px-4 sm:px-6 pb-4">
    <div class="relative">
      <input
        type="text"
        [(ngModel)]="terminoBusqueda"
        (ngModelChange)="onTerminoBusquedaChange()"
        (keyup.enter)="buscar()"
        placeholder="Buscar por nombre, descripción o etiquetas..."
        class="w-full pl-10 pr-20 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm sm:text-base"
      >
      <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
      <div class="absolute right-2 top-1/2 transform -translate-y-1/2 flex space-x-2">
        <button *ngIf="terminoBusqueda" (click)="limpiarBusqueda()" class="text-gray-400 hover:text-gray-600">
          <i class="fas fa-times"></i>
        </button>
        <button (click)="buscar()" class="bg-blue-600 text-white px-3 py-1 rounded-md hover:bg-blue-700 text-sm">
          Buscar
        </button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="px-4 sm:px-6 pb-4">
    <div class="flex flex-col sm:flex-row gap-3">

      <!-- Filtro Tipo -->
      <div class="flex-1">
        <label class="block text-xs font-bold text-gray-700 mb-1">Tipo</label>
        <div class="flex space-x-2">
          <button *ngIf="mostrarFiltroTodos" (click)="cambiarFiltroTipo('todos')"
            [class]="'flex-1 py-2 px-3 rounded-lg font-semibold text-sm transition ' +
                     (filtroTipo === 'todos' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200')">
            Todos
          </button>
          <button *ngIf="mostrarFiltroProductos" (click)="cambiarFiltroTipo('producto')"
            [class]="'flex-1 py-2 px-3 rounded-lg font-semibold text-sm transition ' +
                     (filtroTipo === 'producto' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200')">
            <i class="fas fa-box mr-1"></i> Productos
          </button>
          <button *ngIf="mostrarFiltroServicios" (click)="cambiarFiltroTipo('servicio')"
            [class]="'flex-1 py-2 px-3 rounded-lg font-semibold text-sm transition ' +
                     (filtroTipo === 'servicio' ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200')">
            <i class="fas fa-tools mr-1"></i> Servicios
          </button>
          <div *ngIf="!mostrarFiltroProductos && !mostrarFiltroServicios"
               class="flex-1 py-2 px-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 text-center">
            <i class="fas fa-exclamation-triangle mr-1"></i> Ambos tipos deshabilitados
          </div>
        </div>
      </div>

      <!-- ✅ Filtro Categoría — ahora usa cat.id y cat.nombre -->
      <div class="flex-1">
        <label class="block text-xs font-bold text-gray-700 mb-1">Categoría</label>
        <select
          [(ngModel)]="filtroCategoria"
          (change)="cambiarFiltroCategoria(filtroCategoria)"
          class="w-full py-2 px-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
          <option value="todas">Todas</option>
          <option *ngFor="let cat of categoriasDisponibles" [value]="cat.id">{{ cat.nombre }}</option>
        </select>
      </div>

      <!-- Filtro Disponibilidad -->
      <div class="flex-1">
        <label class="block text-xs font-bold text-gray-700 mb-1">Disponibilidad</label>
        <select
          [(ngModel)]="filtroDisponible"
          (change)="cambiarFiltroDisponible(filtroDisponible)"
          class="w-full py-2 px-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
          <option value="todos">Todos</option>
          <option value="disponible">Disponibles</option>
          <option value="no_disponible">No disponibles</option>
        </select>
      </div>

      <!-- Ordenamiento -->
      <div class="flex-1">
        <label class="block text-xs font-bold text-gray-700 mb-1">Ordenar por</label>
        <select
          [(ngModel)]="ordenamiento"
          (change)="cambiarOrdenamiento()"
          class="w-full py-2 px-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
          <option value="fecha">Más recientes</option>
          <option value="nombre">Nombre A-Z</option>
          <option value="precio">Precio</option>
          <option value="categoria">Categoría</option>
        </select>
      </div>

    </div>
  </div>
</header>
