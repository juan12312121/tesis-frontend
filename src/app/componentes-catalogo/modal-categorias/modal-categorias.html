<!-- modal-categorias.html -->
<div *ngIf="mostrarModal"
     class="fixed inset-0 z-50 overflow-y-auto"
     (click)="cerrarModal()">
  <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
    <div class="fixed inset-0 transition-opacity bg-gray-900/80 dark:bg-black/90 bg-opacity-75"></div>

    <div class="inline-block align-bottom bg-white dark:bg-slate-800 rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full"
         (click)="stopPropagation($event)">

      <!-- Header -->
      <div class="bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-700 dark:to-indigo-700 px-6 py-4 transition-colors">
        <div class="flex items-center justify-between">
          <h3 class="text-xl font-black text-white flex items-center gap-2">
            <i class="fas fa-tags"></i>
            Gestionar Categorías
          </h3>
          <button (click)="cerrarModal()" class="text-white hover:text-gray-200 transition">
            <i class="fas fa-times text-2xl"></i>
          </button>
        </div>
      </div>

      <div class="p-6 space-y-6">

        <!-- Formulario agregar -->
        <div class="bg-gray-50 dark:bg-slate-900/50 rounded-xl p-4 border border-gray-200 dark:border-slate-700 transition-colors">
          <h4 class="text-sm font-black text-gray-700 dark:text-slate-300 mb-3 flex items-center gap-2">
            <i class="fas fa-plus-circle text-blue-600 dark:text-blue-400"></i>
            Nueva Categoría
          </h4>

          <div class="space-y-3">
            <div>
              <input
                type="text"
                [(ngModel)]="nuevaCategoriaNombre"
                placeholder="Nombre de la categoría *"
                maxlength="100"
                class="w-full px-4 py-2.5 bg-white dark:bg-slate-700 text-gray-900 dark:text-slate-100 border-2 border-gray-300 dark:border-slate-600 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition font-medium text-sm"
              >
            </div>
            <div>
              <input
                type="text"
                [(ngModel)]="nuevaCategoriaDescripcion"
                placeholder="Descripción (opcional)"
                maxlength="255"
                class="w-full px-4 py-2.5 bg-white dark:bg-slate-700 text-gray-900 dark:text-slate-100 border-2 border-gray-300 dark:border-slate-600 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition font-medium text-sm"
              >
            </div>

            <!-- Error -->
            <div *ngIf="error" class="flex items-center gap-2 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg px-3 py-2 transition-colors">
              <i class="fas fa-exclamation-circle text-red-500 dark:text-red-400 text-sm"></i>
              <p class="text-xs text-red-700 dark:text-red-200 font-semibold">{{ error }}</p>
            </div>

            <button
              (click)="agregarCategoria()"
              [disabled]="guardando || !nuevaCategoriaNombre.trim()"
              [class]="nuevaCategoriaNombre.trim() && !guardando
                ? 'w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-2.5 px-4 rounded-lg font-bold text-sm hover:shadow-lg transition'
                : 'w-full bg-gray-200 text-gray-400 py-2.5 px-4 rounded-lg font-bold text-sm cursor-not-allowed'">
              <span class="flex items-center justify-center gap-2">
                <i [class]="guardando ? 'fas fa-spinner fa-spin' : 'fas fa-plus'"></i>
                {{ guardando ? 'Guardando...' : 'Agregar Categoría' }}
              </span>
            </button>
          </div>
        </div>

        <!-- Lista de categorías -->
        <div>
          <h4 class="text-sm font-black text-gray-700 dark:text-slate-300 mb-3 flex items-center justify-between">
            <span class="flex items-center gap-2">
              <i class="fas fa-list text-indigo-600 dark:text-indigo-400"></i>
              Categorías existentes
            </span>
            <span class="text-xs font-semibold text-gray-500 dark:text-slate-400 bg-gray-100 dark:bg-slate-700 px-2 py-1 rounded-full border border-gray-200 dark:border-slate-600">
              {{ categorias.length }} total
            </span>
          </h4>

          <!-- Sin categorías -->
          <div *ngIf="categorias.length === 0"
               class="text-center py-8 bg-gray-50 dark:bg-slate-900/50 rounded-xl border-2 border-dashed border-gray-200 dark:border-slate-700">
            <i class="fas fa-tags text-gray-300 dark:text-slate-600 text-3xl mb-2"></i>
            <p class="text-sm text-gray-500 dark:text-slate-400 font-medium">No hay categorías aún</p>
            <p class="text-xs text-gray-400 dark:text-slate-500">Crea tu primera categoría arriba</p>
          </div>

          <!-- Lista -->
          <div *ngIf="categorias.length > 0" class="space-y-2 max-h-64 overflow-y-auto pr-1">
            <div *ngFor="let cat of categorias"
                 class="flex items-center justify-between p-3 bg-white dark:bg-slate-700/50 rounded-lg border border-gray-200 dark:border-slate-600 hover:border-blue-200 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all group">
              <div class="flex items-center gap-3 min-w-0">
                <div class="w-8 h-8 bg-blue-100 dark:bg-blue-900/40 rounded-lg flex items-center justify-center flex-shrink-0">
                  <i class="fas fa-tag text-blue-600 dark:text-blue-400 text-xs"></i>
                </div>
                <div class="min-w-0">
                  <p class="font-bold text-gray-900 dark:text-slate-100 text-sm truncate">{{ cat.nombre }}</p>
                  <p *ngIf="cat.descripcion" class="text-xs text-gray-500 dark:text-slate-400 truncate">{{ cat.descripcion }}</p>
                </div>
              </div>

              <button
                (click)="eliminarCategoria(cat)"
                [disabled]="eliminando === cat.id"
                class="ml-3 p-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition opacity-0 group-hover:opacity-100 flex-shrink-0"
                title="Eliminar categoría">
                <i [class]="eliminando === cat.id ? 'fas fa-spinner fa-spin text-xs' : 'fas fa-trash text-xs'"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Botón cerrar -->
        <button
          (click)="cerrarModal()"
          class="w-full bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-slate-200 font-bold py-2.5 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-600 transition-colors text-sm">
          Cerrar
        </button>
      </div>
    </div>
  </div>
</div>
