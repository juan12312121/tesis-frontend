<!-- configuracion-catalogo.html -->
<div class="max-w-2xl mx-auto p-6">
  <h1 class="text-2xl font-bold mb-6">Configuración del Catálogo</h1>

  <div class="bg-white rounded-lg shadow p-6 space-y-4">

    <!-- Switch Productos -->
    <div class="flex items-center justify-between">
      <div>
        <h3 class="font-bold text-gray-900">Productos</h3>
        <p class="text-sm text-gray-600">Habilitar productos en el catálogo</p>
      </div>
      <label class="relative inline-flex items-center cursor-pointer">
        <input
          type="checkbox"
          [(ngModel)]="productosHabilitados"
          class="sr-only peer">
        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
      </label>
    </div>

    <!-- Switch Servicios -->
    <div class="flex items-center justify-between">
      <div>
        <h3 class="font-bold text-gray-900">Servicios</h3>
        <p class="text-sm text-gray-600">Habilitar servicios en el catálogo</p>
      </div>
      <label class="relative inline-flex items-center cursor-pointer">
        <input
          type="checkbox"
          [(ngModel)]="serviciosHabilitados"
          class="sr-only peer">
        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
      </label>
    </div>

    <!-- Botón guardar -->
    <button
      (click)="guardar()"
      class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-blue-700 mt-6">
      Guardar
    </button>
  </div>
</div>
